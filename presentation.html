<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Presentation</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    body {
      margin: 0;
      padding: 0;
      background: transparent;
      color: #fff;
      font-family: 'Outfit', sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }
    .presentation-container {
      width: 90%;
      max-width: 1200px;
      margin: 0 auto;
      text-align: center;
    }
    .canva-wrapper {
      position: relative; 
      width: 100%; 
      height: 0; 
      padding-top: 56.2500%;
      padding-bottom: 0; 
      box-shadow: 0 10px 40px rgba(0,0,0,0.5); 
      margin-top: 1.6em; 
      margin-bottom: 0.9em; 
      overflow: hidden;
      border-radius: 12px; 
      will-change: transform;
      border: 1px solid rgba(255,255,255,0.1);
    }
    iframe {
      position: absolute; 
      width: 100%; 
      height: 100%; 
      top: 0; 
      left: 0; 
      border: none; 
      padding: 0;
      margin: 0;
    }
    .canva-link {
      color: #ff0055;
      text-decoration: none;
      font-weight: 600;
      transition: color 0.3s ease;
      display: inline-block;
      margin-top: 1rem;
      padding: 10px 20px;
      border-radius: 8px;
      background: rgba(255, 0, 85, 0.1);
      border: 1px solid rgba(255, 0, 85, 0.3);
    }
    .canva-link:hover {
      color: #fff;
      background: rgba(255, 0, 85, 0.3);
    }
  </style>
</head>
<body>
  <div class="presentation-container">
    <div class="canva-wrapper">
      <iframe loading="lazy" src="https://www.canva.com/design/DAG_Hjw2YBg/Wr6YEc_JfZdk2ucin0L47g/view?embed" allowfullscreen="allowfullscreen" allow="fullscreen"></iframe>
    </div>
    <a class="canva-link" href="https://www.canva.com/design/DAG_Hjw2YBg/Wr6YEc_JfZdk2ucin0L47g/view?utm_content=DAG_Hjw2YBg&utm_campaign=designshare&utm_medium=embeds&utm_source=link" target="_blank" rel="noopener">EoB Presentation</a>
  </div>
</body>
</html>
